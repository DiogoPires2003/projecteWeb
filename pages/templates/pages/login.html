<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>FlavorLoop - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,700;1,6..72,400;1,6..72,700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "secondary-fixed-dim": "#ffb4a5",
                    "surface-container-low": "#f5f4ee",
                    "on-tertiary-fixed": "#301217",
                    "on-secondary-fixed-variant": "#802918",
                    "secondary-fixed": "#ffdad3",
                    "on-background": "#1b1c19",
                    "tertiary-fixed-dim": "#efb9bf",
                    "secondary-container": "#fd876f",
                    "tertiary-fixed": "#ffd9dd",
                    "on-secondary": "#ffffff",
                    "inverse-primary": "#adcfb5",
                    "tertiary": "#7d5359",
                    "on-surface": "#1b1c19",
                    "on-primary": "#ffffff",
                    "surface": "#faf9f3",
                    "on-tertiary-container": "#47242a",
                    "primary-fixed-dim": "#adcfb5",
                    "inverse-on-surface": "#f2f1eb",
                    "outline-variant": "#c2c8c1",
                    "tertiary-container": "#ba898f",
                    "surface-container": "#efeee8",
                    "surface-tint": "#476550",
                    "on-tertiary-fixed-variant": "#633c41",
                    "error-container": "#ffdad6",
                    "secondary": "#9f402d",
                    "primary-container": "#7d9d85",
                    "on-primary-fixed": "#032110",
                    "surface-variant": "#e3e3dd",
                    "on-secondary-fixed": "#3e0500",
                    "surface-bright": "#faf9f3",
                    "primary": "#476550",
                    "outline": "#727972",
                    "on-secondary-container": "#732010",
                    "on-primary-container": "#173422",
                    "on-error-container": "#93000a",
                    "on-primary-fixed-variant": "#304d39",
                    "surface-container-highest": "#e3e3dd",
                    "inverse-surface": "#30312d",
                    "on-surface-variant": "#424843",
                    "primary-fixed": "#c9ebd0",
                    "on-tertiary": "#ffffff",
                    "surface-container-lowest": "#ffffff",
                    "error": "#ba1a1a",
                    "surface-dim": "#dbdad4",
                    "surface-container-high": "#e9e8e2",
                    "on-error": "#ffffff",
                    "background": "#faf9f3"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Newsreader", "serif"],
                    "body": ["Inter", "sans-serif"],
                    "label": ["Inter", "sans-serif"]
            }
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
      }
      body {
        font-family: 'Inter', sans-serif;
        background-color: #faf9f3;
      }
      .serif-display {
        font-family: 'Newsreader', serif;
      }
      .ghost-border {
        border: 1px solid rgba(194, 200, 193, 0.2);
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface flex items-center justify-center min-h-screen p-6">
<!-- Auth Container -->
<main class="w-full max-w-[440px] flex flex-col items-center">
<!-- Minimalist Logo Section -->
<div class="mb-12 flex flex-col items-center space-y-4">
<div class="w-16 h-16 bg-primary-container/20 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="restaurant_menu">restaurant_menu</span>
</div>
<h1 class="serif-display italic font-bold text-4xl tracking-tight text-primary">FlavorLoop</h1>
<p class="text-on-surface-variant text-sm font-medium tracking-wide">YOUR CULINARY JOURNEY AWAITS</p>
</div>
<!-- Content Card: Tonal Layering -->
<div class="w-full bg-surface-container-lowest rounded-xl p-8 md:p-10 shadow-[0_32px_64px_-12px_rgba(71,101,80,0.06)]">
<div class="mb-8">
<h2 class="serif-display text-2xl font-semibold text-on-surface">Welcome back</h2>
<p class="text-on-surface-variant text-sm mt-1">Please enter your details to sign in.</p>
</div>
<!-- Login Form -->
<form class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="block text-xs font-semibold text-on-surface-variant tracking-wider uppercase" for="email">Email address</label>
<input class="w-full h-12 px-4 bg-surface-container-highest border-none rounded-lg focus:bg-surface-container-lowest focus:ring-1 focus:ring-primary/30 transition-all text-on-surface placeholder:text-outline-variant" id="email" name="email" placeholder="chef@flavorloop.com" type="email"/>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="block text-xs font-semibold text-on-surface-variant tracking-wider uppercase" for="password">Password</label>
<a class="text-[11px] font-bold text-primary hover:text-primary-container transition-colors tracking-wide uppercase" href="{% url 'pages:login' %}">Forgot?</a>
</div>
<input class="w-full h-12 px-4 bg-surface-container-highest border-none rounded-lg focus:bg-surface-container-lowest focus:ring-1 focus:ring-primary/30 transition-all text-on-surface placeholder:text-outline-variant" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
<!-- Primary CTA -->
<button class="w-full h-14 bg-primary text-on-primary font-semibold rounded-lg hover:bg-primary/90 active:scale-[0.98] transition-all flex items-center justify-center space-x-2 shadow-sm" type="submit">
<span>Get Cooking</span>
<span class="material-symbols-outlined text-xl" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="relative my-10">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/20"></div>
</div>
<div class="relative flex justify-center text-xs">
<span class="px-4 bg-surface-container-lowest text-on-surface-variant font-medium uppercase tracking-widest">or continue with</span>
</div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center h-12 rounded-lg ghost-border bg-transparent hover:bg-surface-container-low transition-colors group">
<img alt="Google" class="w-5 h-5 mr-3 opacity-80 group-hover:opacity-100" data-alt="minimalist google logo icon on white background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCQuOR4uAdX88IWo8ZaMHw2Gp-8WmZEdar5y5lmbrdd5KdhK73BTcFnGu2E6adtuLa5ixS7e93NZJCVIWMN0PJGAdzFLQXhCaXKM9FmnIBBA9ZUw5FLSL95rw2r90hKbeuIU28pqjhbLt7zIPS2_L_u1GnpKbJ42rz9bznjOT6zsA8FKmn_Mg1SWe4jK6-_4zS8_bnj_VafnxQLb4jCuXEzYOUFZmEvhnLrJY3kMSSk1tRSCm0zcpnQGJxjNOJAQB8CYp8zCwi8Tik"/>
<span class="text-sm font-semibold text-on-surface">Google</span>
</button>
<button class="flex items-center justify-center h-12 rounded-lg ghost-border bg-transparent hover:bg-surface-container-low transition-colors group">
<span class="material-symbols-outlined text-xl mr-3 text-on-surface" data-icon="apple" style="font-variation-settings: 'FILL' 1;">ios</span>
<span class="text-sm font-semibold text-on-surface">Apple</span>
</button>
</div>
</div>
<!-- Toggle Link -->
<p class="mt-8 text-on-surface-variant text-sm">
            Don't have an account? 
            <a class="text-secondary font-bold hover:underline transition-all underline-offset-4 decoration-secondary/30 ml-1" href="{% url 'pages:login' %}">Sign up</a>
</p>
<!-- Footer Decoration -->
<div class="mt-16 flex items-center space-x-6 opacity-30">
<div class="h-[1px] w-12 bg-outline"></div>
<span class="material-symbols-outlined text-sm" data-icon="eco">eco</span>
<div class="h-[1px] w-12 bg-outline"></div>
</div>
</main>
<!-- Decorative Organic Elements (Asymmetric) -->
<div class="fixed top-0 left-0 w-64 h-64 bg-primary/5 rounded-full -translate-x-1/2 -translate-y-1/2 blur-3xl pointer-events-none"></div>
<div class="fixed bottom-0 right-0 w-96 h-96 bg-secondary/5 rounded-full translate-x-1/3 translate-y-1/3 blur-3xl pointer-events-none"></div>
</body></html>

<!-- Login -->
